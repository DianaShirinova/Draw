<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎨 Волшебная раскраска</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{background:#fff9f0;font-family:'Nunito',sans-serif;overflow:hidden;height:100dvh;
  display:flex;flex-direction:column;user-select:none;-webkit-user-select:none;}
#toolbar{display:flex;align-items:center;gap:7px;padding:8px 12px;
  background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.09);z-index:10;flex-shrink:0;flex-wrap:wrap;}
#title{font-family:'Fredoka One',cursive;font-size:1.2rem;
  background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#c77dff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;flex-shrink:0;}
.sep{width:1px;height:32px;background:#eee;flex-shrink:0;}
#palette{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.swatch{width:27px;height:27px;border-radius:50%;border:3px solid transparent;cursor:pointer;
  transition:transform .15s,border-color .15s;flex-shrink:0;}
.swatch:hover{transform:scale(1.2);}
.swatch.active{border-color:#222;transform:scale(1.25);}
.swatch.rainbow{background:conic-gradient(#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#c77dff,#ff6b6b);position:relative;}
.swatch.rainbow::after{content:'🌈';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
#sizeWrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
#sizeWrap span{font-size:.73rem;color:#999;font-weight:700;}
#sizeSlider{-webkit-appearance:none;width:68px;height:6px;border-radius:3px;
  background:linear-gradient(90deg,#ffd93d,#ff6b6b);outline:none;}
#sizeSlider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:#fff;border:3px solid #ff6b6b;cursor:pointer;}
.tool-btn{display:flex;align-items:center;justify-content:center;min-width:32px;height:32px;
  border-radius:9px;border:2px solid #eee;background:#fff;cursor:pointer;font-size:16px;
  transition:background .15s,transform .1s,border-color .15s;flex-shrink:0;padding:0 6px;gap:3px;}
.tool-btn:hover{background:#f0f0f0;transform:scale(1.08);}
.tool-btn.active{border-color:#4d96ff;background:#e8f3ff;}
#btnGallery{background:linear-gradient(135deg,#fff0fa,#f0f7ff);border-color:#c77dff;}
#btnGallery .gl{font-size:.72rem;font-weight:900;color:#c77dff;}
#main{flex:1;display:flex;overflow:hidden;position:relative;}
#canvasWrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 15% 20%,#fff0fa 0%,transparent 40%),
             radial-gradient(circle at 85% 80%,#f0f7ff 0%,transparent 40%),#fff9f0;}
canvas{display:block;cursor:crosshair;touch-action:none;background:#fff;
  border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.12);}
/* Gallery */
#gallery{position:absolute;inset:0;background:rgba(255,249,240,.97);backdrop-filter:blur(6px);
  z-index:20;display:flex;flex-direction:column;transition:opacity .22s,transform .22s;}
#gallery.hidden{opacity:0;pointer-events:none;transform:translateY(14px);}
#ghdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 6px;flex-shrink:0;}
#ghdr h2{font-family:'Fredoka One',cursive;font-size:1.4rem;
  background:linear-gradient(90deg,#ff6b6b,#c77dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#btnClose{width:34px;height:34px;border-radius:50%;border:2px solid #eee;background:#fff;
  cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
#btnClose:hover{background:#fee;}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:12px;padding:8px 18px 18px;overflow-y:auto;flex:1;}
.pcard{background:#fff;border-radius:12px;border:3px solid #eee;cursor:pointer;overflow:hidden;
  transition:transform .15s,border-color .2s,box-shadow .2s;display:flex;flex-direction:column;align-items:center;}
.pcard:hover{transform:scale(1.04);border-color:#c77dff;box-shadow:0 4px 20px rgba(199,125,255,.25);}
.pcard canvas{width:100%;height:110px;}
.pcard .lbl{font-size:.72rem;font-weight:900;color:#888;padding:5px;text-align:center;}
#status{text-align:center;padding:3px;font-size:.68rem;color:#bbb;font-weight:700;
  letter-spacing:.04em;flex-shrink:0;}
.sparkle{position:fixed;pointer-events:none;border-radius:50%;
  animation:sp .6s ease-out forwards;z-index:200;}
@keyframes sp{0%{transform:translate(-50%,-50%) scale(1);opacity:1}
              to{transform:translate(-50%,-50%) scale(0) translateY(-28px);opacity:0}}
#cur{position:fixed;pointer-events:none;border-radius:50%;border:2px solid rgba(0,0,0,.3);
  transform:translate(-50%,-50%);z-index:100;display:none;}
</style>
</head>
<body>
<div id="toolbar">
  <div id="title">✏️ Волшебная раскраска</div>
  <div class="sep"></div>
  <div id="palette">
    <div class="swatch rainbow active" data-c="rainbow"></div>
    <div class="swatch" style="background:#ff6b6b" data-c="#ff6b6b"></div>
    <div class="swatch" style="background:#ff9f43" data-c="#ff9f43"></div>
    <div class="swatch" style="background:#ffd93d" data-c="#ffd93d"></div>
    <div class="swatch" style="background:#6bcb77" data-c="#6bcb77"></div>
    <div class="swatch" style="background:#4d96ff" data-c="#4d96ff"></div>
    <div class="swatch" style="background:#c77dff" data-c="#c77dff"></div>
    <div class="swatch" style="background:#ff85a1" data-c="#ff85a1"></div>
    <div class="swatch" style="background:#5e4b3c" data-c="#5e4b3c"></div>
    <div class="swatch" style="background:#333"    data-c="#333"></div>
    <div class="swatch" style="background:#fff;border:2px solid #ddd" data-c="#fff"></div>
  </div>
  <div class="sep"></div>
  <div id="sizeWrap">
    <span>✏️</span><input type="range" id="sizeSlider" min="2" max="60" value="12"><span id="szLbl">12</span>
  </div>
  <div class="sep"></div>
  <div class="tool-btn active" id="btnDraw">✏️</div>
  <div class="tool-btn" id="btnFill">🪣</div>
  <div class="tool-btn" id="btnEraser">🧹</div>
  <div class="tool-btn" id="btnGallery">🖼️<span class="gl">Картинки</span></div>
  <div class="tool-btn" id="btnClear">🗑️</div>
  <div class="tool-btn" id="btnSave">💾</div>
</div>
<div id="main">
  <div id="canvasWrap"><canvas id="canvas"></canvas></div>
  <div id="gallery" class="hidden">
    <div id="ghdr"><h2>🖼️ Выбери картинку</h2><div id="btnClose">✕</div></div>
    <div id="grid"></div>
  </div>
</div>
<div id="status">Рисуй пальцем или Apple Pencil ✨ · 🖼️ Картинки — выбери шаблон · 🪣 Заливка</div>
<div id="cur"></div>

<script>
// ─────────────────────────────────────────────────────────────
// PICTURE LIBRARY  — each picture is a draw(ctx,W,H) function
// ─────────────────────────────────────────────────────────────
const PICS = [
{name:'Пустой лист', emoji:'⬜', draw(c,W,H){
  c.strokeStyle='#ddd'; c.lineWidth=2; c.setLineDash([6,4]);
  roundRect(c,W*.1,H*.1,W*.8,H*.8,12); c.stroke(); c.setLineDash([]);
  c.font=`${W*.18}px serif`; c.textAlign='center'; c.fillStyle='#e0e0e0';
  c.fillText('✏️',W/2,H/2+W*.07);
}},
{name:'Котик', emoji:'🐱', draw(c,W,H){
  const s=W/200;
  function sc(x,y){return[x*s,y*s];}
  c.lineWidth=3*s; c.strokeStyle='#222'; c.fillStyle='#fff';
  // body
  ellipse(c,...sc(100,140),55*s,45*s); c.fill(); c.stroke();
  // head
  c.beginPath(); c.arc(...sc(100,82),38*s,0,Math.PI*2); c.fill(); c.stroke();
  // ears
  poly(c,[sc(68,52),sc(58,18),sc(88,48)]); c.fill(); c.stroke();
  poly(c,[sc(132,52),sc(142,18),sc(112,48)]); c.fill(); c.stroke();
  // inner ears
  c.lineWidth=2*s;
  poly(c,[sc(70,50),sc(63,28),sc(86,47)]); c.stroke();
  poly(c,[sc(130,50),sc(137,28),sc(114,47)]); c.stroke();
  // eyes
  c.lineWidth=2.5*s;
  ellipse(c,...sc(87,78),8*s,9*s); c.fill(); c.stroke();
  ellipse(c,...sc(113,78),8*s,9*s); c.fill(); c.stroke();
  c.fillStyle='#222';
  ellipse(c,...sc(87,79),4*s,5*s); c.fill();
  ellipse(c,...sc(113,79),4*s,5*s); c.fill();
  c.fillStyle='#fff';
  c.beginPath(); c.arc(...sc(85,77),2*s,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(...sc(111,77),2*s,0,Math.PI*2); c.fill();
  // nose
  c.fillStyle='#fff'; c.strokeStyle='#222'; c.lineWidth=2*s;
  poly(c,[sc(100,90),sc(96,95),sc(104,95)]); c.fill(); c.stroke();
  // mouth
  c.beginPath(); c.moveTo(...sc(96,95)); c.quadraticCurveTo(...sc(100,102),...sc(104,95)); c.stroke();
  // whiskers
  c.lineWidth=1.5*s;
  [[62,89,88,92],[62,94,88,94],[138,89,112,92],[138,94,112,94]].forEach(([x1,y1,x2,y2])=>{
    c.beginPath(); c.moveTo(...sc(x1,y1)); c.lineTo(...sc(x2,y2)); c.stroke();
  });
  // tail
  c.lineWidth=3.5*s; c.strokeStyle='#222';
  c.beginPath(); c.moveTo(...sc(150,160)); c.quadraticCurveTo(...sc(180,120),...sc(170,90)); c.stroke();
  // paws
  c.fillStyle='#fff'; c.lineWidth=2.5*s;
  ellipse(c,...sc(75,178),14*s,8*s); c.fill(); c.stroke();
  ellipse(c,...sc(125,178),14*s,8*s); c.fill(); c.stroke();
}},
{name:'Ракета', emoji:'🚀', draw(c,W,H){
  const s=W/200;
  c.strokeStyle='#222'; c.fillStyle='#fff'; c.lineWidth=3*s;
  // body
  c.beginPath(); c.moveTo(...sc2(100,15,s)); c.quadraticCurveTo(...sc2(125,40,s),...sc2(128,100,s));
  c.lineTo(...sc2(72,100,s)); c.quadraticCurveTo(...sc2(75,40,s),...sc2(100,15,s)); c.closePath();
  c.fill(); c.stroke();
  // window
  c.lineWidth=2.5*s;
  c.beginPath(); c.arc(...sc2(100,72,s),16*s,0,Math.PI*2); c.fill(); c.stroke();
  c.lineWidth=2*s;
  c.beginPath(); c.arc(...sc2(100,72,s),9*s,0,Math.PI*2); c.fill(); c.stroke();
  // mid body
  c.lineWidth=3*s;
  rect(c,...sc2(72,100,s),56*s,50*s); c.fill(); c.stroke();
  // fins
  poly(c,[sc2(72,100,s),sc2(48,150,s),sc2(72,145,s)]); c.fill(); c.stroke();
  poly(c,[sc2(128,100,s),sc2(152,150,s),sc2(128,145,s)]); c.fill(); c.stroke();
  // exhaust
  c.lineWidth=2.5*s;
  c.beginPath(); c.moveTo(...sc2(80,150,s)); c.quadraticCurveTo(...sc2(90,175,s),...sc2(100,165,s));
  c.quadraticCurveTo(...sc2(110,175,s),...sc2(120,150,s)); c.stroke();
  // flames
  c.lineWidth=2*s; c.setLineDash([4*s,2*s]);
  c.beginPath(); c.moveTo(...sc2(88,162,s)); c.quadraticCurveTo(...sc2(92,185,s),...sc2(100,175,s));
  c.quadraticCurveTo(...sc2(108,185,s),...sc2(112,162,s)); c.stroke();
  c.setLineDash([]);
  // stars
  c.fillStyle='#222'; c.font=`${14*s}px serif`;
  c.fillText('★',...sc2(32,62,s)); c.font=`${10*s}px serif`;
  c.fillText('★',...sc2(152,80,s)); c.font=`${8*s}px serif`;
  c.fillText('★',...sc2(24,108,s));
}},
{name:'Домик', emoji:'🏠', draw(c,W,H){
  const s=W/200;
  c.strokeStyle='#222'; c.fillStyle='#fff'; c.lineWidth=3*s;
  // house
  rect(c,...sc2(35,105,s),130*s,85*s); c.fill(); c.stroke();
  // roof
  poly(c,[sc2(20,110,s),sc2(100,35,s),sc2(180,110,s)]); c.fill(); c.stroke();
  // chimney
  c.lineWidth=2.5*s;
  rect(c,...sc2(130,48,s),22*s,35*s); c.fill(); c.stroke();
  // smoke
  c.lineWidth=2*s; c.lineCap='round';
  [[138,48,134,36,140,28,146,20,142,10],[150,48,146,36,152,28,158,20,154,10]].forEach(p=>{
    c.beginPath(); c.moveTo(...sc2(p[0],p[1],s));
    c.quadraticCurveTo(...sc2(p[2],p[3],s),...sc2(p[4],p[5],s));
    c.quadraticCurveTo(...sc2(p[6],p[7],s),...sc2(p[8],p[9],s)); c.stroke();
  });
  // door
  c.lineWidth=2.5*s;
  c.beginPath(); c.moveTo(...sc2(83,190,s)); c.lineTo(...sc2(83,142,s));
  c.quadraticCurveTo(...sc2(100,130,s),...sc2(117,142,s)); c.lineTo(...sc2(117,190,s)); c.fill(); c.stroke();
  c.fillStyle='#222'; c.beginPath(); c.arc(...sc2(112,165,s),3*s,0,Math.PI*2); c.fill();
  // windows
  c.fillStyle='#fff'; c.lineWidth=2.5*s;
  roundRect(c,...sc2(44,118,s),36*s,30*s,4*s); c.fill(); c.stroke();
  c.lineWidth=1.5*s;
  line(c,...sc2(62,118,s),...sc2(62,148,s)); line(c,...sc2(44,133,s),...sc2(80,133,s));
  c.lineWidth=2.5*s;
  roundRect(c,...sc2(120,118,s),36*s,30*s,4*s); c.fill(); c.stroke();
  c.lineWidth=1.5*s;
  line(c,...sc2(138,118,s),...sc2(138,148,s)); line(c,...sc2(120,133,s),...sc2(156,133,s));
  // flowers
  c.fillStyle='#fff'; c.lineWidth=2*s;
  c.beginPath(); c.arc(...sc2(28,170,s),6*s,0,Math.PI*2); c.fill(); c.stroke();
  line(c,...sc2(28,176,s),...sc2(28,190,s));
  c.beginPath(); c.arc(...sc2(172,162,s),6*s,0,Math.PI*2); c.fill(); c.stroke();
  line(c,...sc2(172,168,s),...sc2(172,185,s));
}},
{name:'Рыбка', emoji:'🐟', draw(c,W,H){
  const s=W/200;
  c.strokeStyle='#222'; c.fillStyle='#fff'; c.lineWidth=3*s;
  // tail
  poly(c,[sc2(148,100,s),sc2(178,68,s),sc2(178,132,s)]); c.fill(); c.stroke();
  // body
  ellipse(c,...sc2(95,100,s),68*s,42*s); c.fill(); c.stroke();
  // eye
  c.lineWidth=2.5*s;
  c.beginPath(); c.arc(...sc2(52,90,s),12*s,0,Math.PI*2); c.fill(); c.stroke();
  c.fillStyle='#222'; c.beginPath(); c.arc(...sc2(50,89,s),6*s,0,Math.PI*2); c.fill();
  c.fillStyle='#fff'; c.beginPath(); c.arc(...sc2(48,87,s),2*s,0,Math.PI*2); c.fill();
  // mouth
  c.strokeStyle='#222'; c.lineWidth=2.5*s; c.lineCap='round';
  c.beginPath(); c.moveTo(...sc2(28,100,s)); c.quadraticCurveTo(...sc2(22,106,s),...sc2(28,112,s)); c.stroke();
  // fins
  c.fillStyle='#fff'; c.lineWidth=2.5*s;
  c.beginPath(); c.moveTo(...sc2(85,58,s)); c.quadraticCurveTo(...sc2(100,35,s),...sc2(115,58,s)); c.stroke();
  c.beginPath(); c.moveTo(...sc2(90,142,s)); c.quadraticCurveTo(...sc2(105,162,s),...sc2(118,142,s)); c.stroke();
  // scales
  c.lineWidth=1.5*s;
  [[80,80,90,72,100,80],[100,80,110,72,120,80],[90,95,100,87,110,95],
   [110,95,120,87,130,95],[80,110,90,102,100,110],[100,110,110,102,120,110]].forEach(([x1,y1,cx,cy,x2,y2])=>{
    c.beginPath(); c.moveTo(...sc2(x1,y1,s)); c.quadraticCurveTo(...sc2(cx,cy,s),...sc2(x2,y2,s)); c.stroke();
  });
  // bubbles
  c.fillStyle='#fff'; c.lineWidth=2*s;
  [[22,78,5],[14,64,7],[30,55,4]].forEach(([x,y,r])=>{
    c.beginPath(); c.arc(...sc2(x,y,s),r*s,0,Math.PI*2); c.fill(); c.stroke();
  });
}},
{name:'Бабочка', emoji:'🦋', draw(c,W,H){
  const s=W/200;
  c.strokeStyle='#222'; c.fillStyle='#fff'; c.lineWidth=3*s;
  // wings
  const wings=[
    [[100,100],[60,40],[20,55],[10,90],[50,108],[75,115],[100,100]],
    [[100,100],[140,40],[180,55],[190,90],[150,108],[125,115],[100,100]],
    [[100,105],[55,115],[30,145],[45,175],[80,160],[100,105]],
    [[100,105],[145,115],[170,145],[155,175],[120,160],[100,105]],
  ];
  wings.forEach(pts=>{
    c.beginPath(); c.moveTo(...sc2(pts[0][0],pts[0][1],s));
    pts.slice(1).forEach(p=>c.lineTo(...sc2(p[0],p[1],s)));
    c.closePath(); c.fill(); c.stroke();
  });
  // circles
  c.lineWidth=2*s;
  [[62,78,14],[138,78,14],[55,140,9],[145,140,9]].forEach(([x,y,r])=>{
    c.beginPath(); c.arc(...sc2(x,y,s),r*s,0,Math.PI*2); c.fill(); c.stroke();
  });
  c.lineWidth=1.5*s;
  [[42,88,5],[158,88,5]].forEach(([x,y,r])=>{
    c.beginPath(); c.arc(...sc2(x,y,s),r*s,0,Math.PI*2); c.fill(); c.stroke();
  });
  // body
  c.lineWidth=3*s;
  ellipse(c,...sc2(100,110,s),6*s,38*s); c.fill(); c.stroke();
  c.beginPath(); c.arc(...sc2(100,68,s),9*s,0,Math.PI*2); c.fill(); c.stroke();
  // antennae
  c.lineWidth=2*s; c.lineCap='round';
  c.beginPath(); c.moveTo(...sc2(96,60,s)); c.quadraticCurveTo(...sc2(84,40,s),...sc2(78,30,s)); c.stroke();
  c.beginPath(); c.arc(...sc2(78,30,s),4*s,0,Math.PI*2); c.fill(); c.stroke();
  c.beginPath(); c.moveTo(...sc2(104,60,s)); c.quadraticCurveTo(...sc2(116,40,s),...sc2(122,30,s)); c.stroke();
  c.beginPath(); c.arc(...sc2(122,30,s),4*s,0,Math.PI*2); c.fill(); c.stroke();
}},
{name:'Динозавр', emoji:'🦕', draw(c,W,H){
  const s=W/200;
  c.strokeStyle='#222'; c.fillStyle='#fff'; c.lineWidth=3*s;
  // tail
  c.beginPath(); c.moveTo(...sc2(155,145,s));
  c.quadraticCurveTo(...sc2(190,130,s),...sc2(195,110,s));
  c.quadraticCurveTo(...sc2(192,95,s),...sc2(178,105,s)); c.stroke();
  // body
  ellipse(c,...sc2(110,138,s),55*s,38*s); c.fill(); c.stroke();
  // neck
  c.beginPath(); c.moveTo(...sc2(75,112,s));
  c.quadraticCurveTo(...sc2(68,70,s),...sc2(82,45,s));
  c.quadraticCurveTo(...sc2(90,25,s),...sc2(100,42,s));
  c.quadraticCurveTo(...sc2(108,58,s),...sc2(105,110,s));
  c.closePath(); c.fill(); c.stroke();
  // head
  ellipse(c,...sc2(88,36,s),24*s,18*s); c.fill(); c.stroke();
  // eye
  c.lineWidth=2*s;
  c.beginPath(); c.arc(...sc2(80,30,s),7*s,0,Math.PI*2); c.fill(); c.stroke();
  c.fillStyle='#222'; c.beginPath(); c.arc(...sc2(79,30,s),3.5*s,0,Math.PI*2); c.fill();
  c.fillStyle='#fff'; c.beginPath(); c.arc(...sc2(78,29,s),1.5*s,0,Math.PI*2); c.fill();
  c.fillStyle='#222'; c.beginPath(); c.arc(...sc2(68,36,s),2.5*s,0,Math.PI*2); c.fill();
  // mouth
  c.strokeStyle='#222'; c.lineWidth=2*s;
  c.beginPath(); c.moveTo(...sc2(65,40,s)); c.quadraticCurveTo(...sc2(72,48,s),...sc2(82,42,s)); c.stroke();
  // spines
  c.fillStyle='#fff'; c.lineWidth=2*s;
  [[88,112,84,88,92,88],[100,108,96,80,104,80],[112,106,108,76,116,76],[124,108,120,82,128,82]].forEach(([x1,y1,x2,y2,x3,y3])=>{
    poly(c,[sc2(x1,y1,s),sc2(x2,y2,s),sc2(x3,y3,s)]); c.fill(); c.stroke();
  });

  c.fillStyle='#222'; ellipse(c,...sc2(78,66,s),5*s,3*s); c.fill();

}},
{name:'Поезд', emoji:'🚂', draw(c,W,H){

  // body windows
  [[30,105,22,20,4],[62,105,22,20,4],[94,105,16,20,4]].forEach(([x,y,w,h,r])=>{

  // wagon

  [[150,117,15,18,3],[171,117,15,18,3]].forEach(([x,y,w,h,r])=>{roundRect(c,...sc2(x,y,s),w*s,h*s,r*s);c.fill();c.stroke();});
  [[158,168,12],[178,168,12]].forEach(([x,y,r])=>{

// ── Helper drawing utils ──
function sc2(x,y,s){return[x*s,y*s];}
function ellipse(c,cx,cy,rx,ry){c.beginPath();c.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);}
function ellipse2(c,cx,cy,rx,ry){c.beginPath();c.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);c.fill();c.stroke();}
function poly(c,pts){c.beginPath();c.moveTo(pts[0][0],pts[0][1]);pts.slice(1).forEach(p=>c.lineTo(p[0],p[1]));c.closePath();}
function rect(c,x,y,w,h){c.beginPath();c.rect(x,y,w,h);}
function roundRect(c,x,y,w,h,r){c.beginPath();c.roundRect(x,y,w,h,r);}
function line(c,x1,y1,x2,y2){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();}

// ─────────────────────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────────────────────
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('canvasWrap');
const curEl=document.getElementById('cur');
const sizeSlider=document.getElementById('sizeSlider');
const szLbl=document.getElementById('szLbl');

let drawing=false, tool='draw', brushSize=12;
let selectedColor='rainbow', rainbowHue=0;
let lastX=0, lastY=0, lastColor='#ff6b6b';
let currentPic=0;

function resizeCanvas(){
  const ww=wrap.clientWidth-32, wh=wrap.clientHeight-32;
  const tmp=document.createElement('canvas');
  tmp.width=canvas.width; tmp.height=canvas.height;
  tmp.getContext('2d').drawImage(canvas,0,0);
  canvas.width=Math.min(ww,1000); canvas.height=Math.min(wh,750);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(tmp,0,0);
  if(currentPic>0) drawTemplate(currentPic);
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

function drawTemplate(idx){
  if(idx===0) return;
  const W=canvas.width, H=canvas.height;
  const size=Math.min(W,H)*0.86;
  const ox=(W-size)/2, oy=(H-size)/2;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.translate(ox,oy);
  PICS[idx].draw(ctx,size,size);
  ctx.restore();
}

function loadPicture(idx){
  currentPic=idx;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  if(idx>0) drawTemplate(idx);
  closeGallery();
}

// Build gallery thumbnails
(function(){
  const grid=document.getElementById('grid');
  PICS.forEach((p,i)=>{
    const card=document.createElement('div'); card.className='pcard';
    const tnv=document.createElement('canvas');
    tnv.width=260; tnv.height=220; tnv.style.cssText='width:100%;height:110px;';
    const tc=tnv.getContext('2d');
    tc.fillStyle='#fff'; tc.fillRect(0,0,260,220);
    if(i>0){
      tc.save(); tc.translate(10,10); p.draw(tc,240,200); tc.restore();
    } else {
      tc.strokeStyle='#ddd'; tc.lineWidth=2; tc.setLineDash([5,3]);
      tc.strokeRect(10,10,240,200); tc.setLineDash([]);
      tc.font='48px serif'; tc.textAlign='center'; tc.fillStyle='#e0e0e0';
      tc.fillText('✏️',130,125);
    }
    const lbl=document.createElement('div'); lbl.className='lbl';
    lbl.textContent=p.emoji+' '+p.name;
    card.appendChild(tnv); card.appendChild(lbl);
    card.addEventListener('click',()=>loadPicture(i));
    grid.appendChild(card);
  });
})();

function openGallery(){document.getElementById('gallery').classList.remove('hidden');}
function closeGallery(){document.getElementById('gallery').classList.add('hidden');}
document.getElementById('btnGallery').addEventListener('click',openGallery);
document.getElementById('btnClose').addEventListener('click',closeGallery);

// ─────────────────────────────────────────────────────────────
// DRAWING
// ─────────────────────────────────────────────────────────────
function getColor(){
  if(tool==='eraser') return '#ffffff';
  if(selectedColor==='rainbow'){
    rainbowHue=(rainbowHue+2)%360;
    lastColor=`hsl(${rainbowHue},90%,55%)`;
    return lastColor;
  }
  lastColor=selectedColor; return selectedColor;
}

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return[s.clientX-r.left,s.clientY-r.top];
}

function startDraw(e){
  if(tool==='fill'){fill(e);return;}
  drawing=true; [lastX,lastY]=getPos(e);
  ctx.beginPath(); ctx.arc(lastX,lastY,brushSize/2,0,Math.PI*2);
  ctx.fillStyle=getColor(); ctx.fill();
}

function doDraw(e){
  if(!drawing) return; e.preventDefault();
  const pts=e.touches?Array.from(e.touches):[e];
  pts.forEach(pt=>{
    const r=canvas.getBoundingClientRect();
    const x=(pt.clientX??pt.x)-r.left, y=(pt.clientY??pt.y)-r.top;
    const col=getColor();
    ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y);
    ctx.strokeStyle=col; ctx.lineWidth=brushSize; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    if(selectedColor==='rainbow'&&Math.random()<.06) spawnSparkle(pt.clientX??x+r.left,pt.clientY??y+r.top,col);
    lastX=x; lastY=y;
  });
  updateCur(e);
}

function endDraw(){drawing=false;}

function fill(e){
  const[fx,fy]=getPos(e);
  const x0=Math.floor(fx),y0=Math.floor(fy);
  const W=canvas.width,H=canvas.height;
  const imgData=ctx.getImageData(0,0,W,H), data=imgData.data;
  const t=(y0*W+x0)*4;
  const tR=data[t],tG=data[t+1],tB=data[t+2],tA=data[t+3];
  const tmp=document.createElement('canvas'); tmp.width=tmp.height=1;
  const tc=tmp.getContext('2d');
  tc.fillStyle=selectedColor==='rainbow'?lastColor:selectedColor; tc.fillRect(0,0,1,1);
  const[fR,fG,fB]=tc.getImageData(0,0,1,1).data;
  if(tR===fR&&tG===fG&&tB===fB) return;
  const match=i=>data[i]===tR&&data[i+1]===tG&&data[i+2]===tB&&data[i+3]===tA;
  const stack=[[x0,y0]], vis=new Uint8Array(W*H);
  while(stack.length){
    const[x,y]=stack.pop();
    if(x<0||x>=W||y<0||y>=H) continue;
    const vi=y*W+x; if(vis[vi]) continue;
    const i=vi*4; if(!match(i)) continue;
    vis[vi]=1; data[i]=fR;data[i+1]=fG;data[i+2]=fB;data[i+3]=255;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imgData,0,0);
}

function spawnSparkle(cx,cy,color){
  const el=document.createElement('div'); el.className='sparkle';
  const sz=4+Math.random()*8;
  el.style.cssText=`width:${sz}px;height:${sz}px;left:${cx+(Math.random()-.5)*20}px;top:${cy+(Math.random()-.5)*20}px;background:${color};`;
  document.body.appendChild(el); setTimeout(()=>el.remove(),650);
}

function updateCur(e){
  const s=e.touches?e.touches[0]:e; if(!s) return;
  curEl.style.cssText=`display:block;width:${brushSize}px;height:${brushSize}px;left:${s.clientX}px;top:${s.clientY}px;background:${tool==='eraser'?'rgba(255,255,255,.6)':lastColor+'88'};border-color:${tool==='eraser'?'#ccc':lastColor};`;
}
canvas.addEventListener('mousemove',updateCur);
canvas.addEventListener('mouseleave',()=>curEl.style.display='none');
canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('mousemove',doDraw);
canvas.addEventListener('mouseup',endDraw);
canvas.addEventListener('touchstart',startDraw,{passive:false});
canvas.addEventListener('touchmove',doDraw,{passive:false});
canvas.addEventListener('touchend',endDraw);
canvas.addEventListener('mouseleave',endDraw);

// palette
document.querySelectorAll('.swatch').forEach(s=>{
  s.addEventListener('click',()=>{
    document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
    s.classList.add('active'); selectedColor=s.dataset.c;
    if(tool==='eraser') setTool('draw');
  });
});

sizeSlider.addEventListener('input',()=>{brushSize=+sizeSlider.value; szLbl.textContent=brushSize;});

function setTool(t){
  tool=t;
  ['btnDraw','btnFill','btnEraser'].forEach(id=>document.getElementById(id).classList.remove('active'));
  if(t==='draw')   document.getElementById('btnDraw').classList.add('active');
  if(t==='fill')   document.getElementById('btnFill').classList.add('active');
  if(t==='eraser') document.getElementById('btnEraser').classList.add('active');
}
document.getElementById('btnDraw').addEventListener('click',()=>setTool('draw'));
document.getElementById('btnFill').addEventListener('click',()=>setTool('fill'));
document.getElementById('btnEraser').addEventListener('click',()=>setTool('eraser'));

document.getElementById('btnClear').addEventListener('click',()=>{
  if(confirm('Очистить рисунок? 🗑️')){
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
    if(currentPic>0) drawTemplate(currentPic);
  }
});
document.getElementById('btnSave').addEventListener('click',()=>{
  const a=document.createElement('a'); a.download='рисунок.png'; a.href=canvas.toDataURL(); a.click();
});
window.addEventListener('keydown',e=>{
  if(e.key==='e'||e.key==='E') setTool('eraser');
  if(e.key==='d'||e.key==='D') setTool('draw');
  if(e.key==='f'||e.key==='F') setTool('fill');
  if(e.key==='Escape') closeGallery();
});
</script>
